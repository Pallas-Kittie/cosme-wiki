<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingredient — Cosme Wiki</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page">
  <a href="index.html" class="back-link">&#8592; Back to Browse</a>
  <div id="ingredient-root"></div>
</div>

<script src="data/products.js"></script>
<script src="data/ingredients.js"></script>
<script src="assets/nav.js"></script>
<script>
var currentIngredient = null;
var allProducts = [];
var editPhotoDataUrl = '';

function loadMergedProducts() {
  var base = typeof COSME_PRODUCTS !== 'undefined' ? COSME_PRODUCTS : [];
  var newProds = [];
  try { newProds = JSON.parse(localStorage.getItem('cosme-new-products') || '[]'); } catch(e){}
  return base.concat(newProds).map(function(p) {
    var edit = null;
    try { edit = JSON.parse(localStorage.getItem('cosme-edits-product-' + p.id)); } catch(e){}
    return edit ? Object.assign({}, p, edit) : p;
  });
}

window.addEventListener('DOMContentLoaded', function() {
  renderNav('index');
  allProducts = loadMergedProducts();
  var id = new URLSearchParams(window.location.search).get('id');
  if (!id) { showError('No ingredient ID specified.'); return; }

  var base = typeof COSME_INGREDIENTS !== 'undefined' ? COSME_INGREDIENTS : [];
  var ing = base.find(function(i) { return i.id === id; });
  if (!ing) { showError('Ingredient not found: ' + id); return; }

  var edit = null;
  try { edit = JSON.parse(localStorage.getItem('cosme-edits-ingredient-' + id)); } catch(e){}
  currentIngredient = edit ? Object.assign({}, ing, edit) : ing;

  document.title = currentIngredient.inci_name_en + ' — Cosme Wiki';
  renderIngredient();
});

// ── VIEW MODE ──────────────────────────────────────────────────────────────

function renderIngredient() {
  var ing = currentIngredient;

  var containingProducts = allProducts.filter(function(p) {
    return (p.ingredients_inci || []).some(function(name) {
      return name.toLowerCase() === (ing.inci_name_en || '').toLowerCase();
    });
  });

  var visualHtml;
  if (ing.photo) {
    visualHtml = '<img src="' + escHtml(ing.photo) + '" alt="' + escHtml(ing.inci_name_en) + '">';
  } else if (ing.color_swatch) {
    visualHtml = '<div style="width:100%;height:100%;background:' + escHtml(ing.color_swatch) +
      ';border-radius:var(--radius);display:flex;align-items:flex-end;justify-content:flex-start;padding:16px;">' +
      '<span style="font-size:12px;color:rgba(0,0,0,0.3);font-family:monospace;">' + escHtml(ing.color_swatch) + '</span></div>';
  } else {
    visualHtml = '<span style="font-size:80px">&#9711;</span>';
  }

  var ap = ing.approval || {};
  var countries = ['EU', 'USA', 'China'];
  var approvalHtml = '<div class="approval-grid">' + countries.map(function(c) {
    var val = ap[c] || 'not-listed';
    var cls = { approved: 'badge-approved', restricted: 'badge-restricted', prohibited: 'badge-prohibited', 'not-listed': 'badge-notlisted' }[val] || 'badge-notlisted';
    var label = { approved: 'Approved', restricted: 'Restricted', prohibited: 'Prohibited', 'not-listed': 'Not Listed' }[val] || val;
    return '<div class="approval-cell"><div class="approval-country">' + escHtml(c) + '</div>' +
      '<div class="approval-badge ' + cls + '">' + label + '</div></div>';
  }).join('') + '</div>';

  var ua = ing.usage_area || {};
  var areas = ['Face', 'Eye', 'Lip', 'Nail'];
  var usageHtml = '<div class="usage-grid">' + areas.map(function(a) {
    var code = ua[a] || '—';
    var cls = { M: 'code-M', S: 'code-S', NR: 'code-NR', X: 'code-X' }[code] || '';
    var labels = { M: 'Major use', S: 'Some use', NR: 'Not recommended', X: 'Prohibited' };
    return '<div class="usage-cell" title="' + escHtml(labels[code] || '') + '">' +
      '<div class="usage-area">' + escHtml(a) + '</div>' +
      '<div class="usage-code ' + cls + '">' + escHtml(code) + '</div>' +
    '</div>';
  }).join('') + '</div>';

  var funcTags = (ing.function || []).map(function(f) { return '<span class="tag tag-accent">' + escHtml(f) + '</span>'; }).join('');

  // Stock / wishlist badges
  var haveBadge = '';
  if (ing.i_have) {
    haveBadge = '<span class="tag tag-used">&#10003; Have it' + (ing.purchased_date ? ' &middot; ' + escHtml(ing.purchased_date) : '') + '</span> ';
  } else if (ing.wishlist) {
    haveBadge = '<span class="tag tag-wishlist">&#9825; Wishlist</span> ';
  }

  var productsHtml = containingProducts.length
    ? containingProducts.map(function(p) {
        return '<div class="mini-card" onclick="location.href=\'product.html?id=' + escHtml(p.id) + '\'">' +
          '<div class="mini-card-name">' + escHtml(p.name) + '</div>' +
          '<div class="mini-card-sub">' + escHtml(p.brand || '') + ' &middot; ' + escHtml(p.type || '') + '</div>' +
        '</div>';
      }).join('')
    : '<p style="font-size:13px;color:var(--muted);">No products in the database contain this ingredient yet.</p>';

  var pctRange = '';
  if (ing.typical_pct_min != null && ing.typical_pct_max != null) {
    pctRange = ing.typical_pct_min + '% – ' + ing.typical_pct_max + '%';
  }

  document.getElementById('ingredient-root').innerHTML =
    '<div class="detail-grid">' +
      '<div><div class="detail-photo" id="detail-visual">' + visualHtml + '</div></div>' +

      '<div class="detail-panel">' +

        '<div class="detail-section" id="section-main">' +
          '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">' +
            '<div>' +
              '<div class="detail-name">' + escHtml(ing.inci_name_en) + '</div>' +
              (ing.name_zh ? '<div class="detail-name-zh">' + escHtml(ing.name_zh) + '</div>' : '') +
              '<div class="tags" style="margin-top:10px;">' + funcTags + haveBadge + '</div>' +
            '</div>' +
            '<button class="edit-toggle-btn" onclick="enterEditMode()">Edit</button>' +
          '</div>' +
          '<table class="kv-table" style="margin-top:14px;">' +
            (ing.inci_name_eu && ing.inci_name_eu !== ing.inci_name_en ? '<tr><td>EU INCI</td><td>' + escHtml(ing.inci_name_eu) + '</td></tr>' : '') +
            (ing.common_name_en ? '<tr><td>Common name (EN)</td><td>' + escHtml(ing.common_name_en) + '</td></tr>' : '') +
            (ing.common_name_zh ? '<tr><td>Common name (ZH)</td><td>' + escHtml(ing.common_name_zh) + '</td></tr>' : '') +
            (pctRange ? '<tr><td>Typical %</td><td>' + escHtml(pctRange) + '</td></tr>' : '') +
            (ing.comedogenic_rating != null ? '<tr><td>Comedogenic</td><td>' + ing.comedogenic_rating + ' / 5</td></tr>' : '') +
            (ing.allergen != null ? '<tr><td>Allergen</td><td>' + (ing.allergen ? '<span class="tag tag-warn">Yes</span>' : '<span class="tag tag-ok">No</span>') + '</td></tr>' : '') +
            (ing.supplier ? '<tr><td>Supplier</td><td>' + escHtml(ing.supplier) + '</td></tr>' : '') +
            (ing.supplier_info ? '<tr><td>Supplier info</td><td style="color:var(--text2);">' + escHtml(ing.supplier_info) + '</td></tr>' : '') +
            (ing.i_have ? '<tr><td>In my stock</td><td><span class="tag tag-used" style="font-size:11px;">&#10003; Yes' + (ing.purchased_date ? ' &middot; bought ' + escHtml(ing.purchased_date) : '') + '</span></td></tr>' : '') +
            (ing.my_notes ? '<tr><td>My notes</td><td style="color:var(--text2);">' + escHtml(ing.my_notes) + '</td></tr>' : '') +
            '<tr><td>Updated</td><td>' + escHtml(ing.updated || ing.added || '') + '</td></tr>' +
          '</table>' +
        '</div>' +

        '<div class="detail-section">' +
          '<div class="detail-section-title">Benefits</div>' +
          (ing.benefits_en ? '<p style="font-size:14px;line-height:1.65;margin-bottom:8px;">' + escHtml(ing.benefits_en) + '</p>' : '') +
          (ing.benefits_zh ? '<p style="font-size:14px;line-height:1.65;color:var(--text2);">' + escHtml(ing.benefits_zh) + '</p>' : '') +
        '</div>' +

        (ing.concerns_en || ing.concerns_zh ? '<div class="detail-section">' +
          '<div class="detail-section-title">Concerns &amp; Cautions</div>' +
          (ing.concerns_en ? '<p style="font-size:14px;line-height:1.65;margin-bottom:8px;">' + escHtml(ing.concerns_en) + '</p>' : '') +
          (ing.concerns_zh ? '<p style="font-size:14px;line-height:1.65;color:var(--text2);">' + escHtml(ing.concerns_zh) + '</p>' : '') +
        '</div>' : '') +

        '<div class="detail-section">' +
          '<div class="detail-section-title">Regulatory Approval</div>' +
          approvalHtml +
        '</div>' +

        '<div class="detail-section">' +
          '<div class="detail-section-title">Usage by Area</div>' +
          usageHtml +
          '<div style="font-size:11px;color:var(--muted);margin-top:10px;">M = Major use &nbsp; S = Some use &nbsp; NR = Not recommended &nbsp; X = Prohibited</div>' +
        '</div>' +

        '<div class="detail-section">' +
          '<div class="detail-section-title">Found in ' + containingProducts.length + ' product' + (containingProducts.length !== 1 ? 's' : '') + '</div>' +
          '<div class="products-grid">' + productsHtml + '</div>' +
        '</div>' +

      '</div>' +
    '</div>';
}

// ── EDIT MODE ──────────────────────────────────────────────────────────────

function enterEditMode() {
  var ing = currentIngredient;
  editPhotoDataUrl = '';

  document.getElementById('section-main').innerHTML =
    '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:18px;">Editing</div>' +

    '<div class="edit-field">' +
      '<div class="edit-field-label">In my stock?</div>' +
      '<div class="entry-type-row" id="have-btn-row">' +
        '<button type="button" class="entry-type-btn' + (!ing.i_have && !ing.wishlist ? ' active' : '') + '" onclick="setHaveState(this,\'none\')">— None</button>' +
        '<button type="button" class="entry-type-btn' + (ing.i_have ? ' active' : '') + '" onclick="setHaveState(this,\'have\')">&#10003; I have it</button>' +
        '<button type="button" class="entry-type-btn' + (ing.wishlist ? ' active' : '') + '" onclick="setHaveState(this,\'wish\')">&#9825; Wishlist</button>' +
      '</div>' +
    '</div>' +

    '<div class="edit-field" id="date-field" style="' + (ing.i_have ? '' : 'display:none') + '">' +
      '<div class="edit-field-label">Purchase date</div>' +
      '<input type="date" id="edit-purchased-date" class="ingest-input" value="' + escHtml(ing.purchased_date || '') + '" style="max-width:180px;">' +
    '</div>' +

    '<div class="edit-field">' +
      '<div class="edit-field-label">Photo</div>' +
      '<div id="photo-preview" style="margin-bottom:8px;">' +
        (ing.photo ? '<img src="' + escHtml(ing.photo) + '" style="width:72px;height:72px;object-fit:cover;border-radius:8px;">' : '') +
      '</div>' +
      '<input type="file" id="edit-photo-input" accept="image/*" onchange="handlePhotoUpload(this)">' +
    '</div>' +

    '<div class="edit-field">' +
      '<div class="edit-field-label">Color swatch (hex)</div>' +
      '<div style="display:flex;gap:8px;align-items:center;">' +
        '<input type="color" id="edit-swatch-picker" value="' + escHtml(ing.color_swatch || '#ffffff') + '" ' +
          'oninput="document.getElementById(\'edit-swatch-hex\').value=this.value; updateSwatchPreview(this.value)" ' +
          'style="width:40px;height:36px;border:1px solid var(--border);border-radius:8px;cursor:pointer;padding:2px;">' +
        '<input type="text" id="edit-swatch-hex" class="ingest-input" value="' + escHtml(ing.color_swatch || '') + '" ' +
          'placeholder="#f5d16b" oninput="updateSwatchPreview(this.value)" style="width:100px;">' +
        '<div id="swatch-live" style="width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:' + escHtml(ing.color_swatch || '#fff') + ';"></div>' +
      '</div>' +
    '</div>' +

    '<div class="edit-field">' +
      '<div class="edit-field-label">My Notes</div>' +
      '<textarea id="edit-notes" class="ingest-textarea" style="min-height:70px;">' + escHtml(ing.my_notes || '') + '</textarea>' +
    '</div>' +

    '<div class="edit-field">' +
      '<div class="edit-field-label">Supplier</div>' +
      '<input type="text" id="edit-supplier" class="ingest-input" value="' + escHtml(ing.supplier || '') + '" placeholder="e.g. BASF, Lonza">' +
    '</div>' +

    '<div class="edit-field">' +
      '<div class="edit-field-label">Supplier info</div>' +
      '<input type="text" id="edit-supplier-info" class="ingest-input" value="' + escHtml(ing.supplier_info || '') + '" placeholder="Grade, order code, notes...">' +
    '</div>' +

    '<div style="display:flex;gap:10px;margin-top:20px;">' +
      '<button class="btn-primary" style="padding:11px;flex:1;" onclick="saveEdit()">Save</button>' +
      '<button class="btn-ghost" onclick="renderIngredient()">Cancel</button>' +
    '</div>';
}

function setHaveState(btn, state) {
  document.querySelectorAll('#have-btn-row .entry-type-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  btn.dataset.haveState = state;
  var dateField = document.getElementById('date-field');
  if (dateField) dateField.style.display = state === 'have' ? '' : 'none';
}

function updateSwatchPreview(val) {
  var live = document.getElementById('swatch-live');
  if (live && /^#[0-9a-fA-F]{3,6}$/.test(val)) live.style.background = val;
  var picker = document.getElementById('edit-swatch-picker');
  if (picker && /^#[0-9a-fA-F]{6}$/.test(val)) picker.value = val;
}

function handlePhotoUpload(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    editPhotoDataUrl = e.target.result;
    var preview = document.getElementById('photo-preview');
    if (preview) preview.innerHTML = '<img src="' + editPhotoDataUrl + '" style="width:72px;height:72px;object-fit:cover;border-radius:8px;">';
    var visual = document.getElementById('detail-visual');
    if (visual) visual.innerHTML = '<img src="' + editPhotoDataUrl + '" alt="preview">';
  };
  reader.readAsDataURL(input.files[0]);
}

function saveEdit() {
  // Determine have/wish state
  var activeHaveBtn = document.querySelector('#have-btn-row .entry-type-btn.active');
  var haveState = activeHaveBtn ? (activeHaveBtn.dataset.haveState || activeHaveBtn.textContent.trim()) : 'none';
  var i_have = haveState === 'have';
  var wishlist = haveState === 'wish';
  var purchasedDateEl = document.getElementById('edit-purchased-date');
  var purchased_date = (i_have && purchasedDateEl) ? purchasedDateEl.value : '';

  var hexInput = document.getElementById('edit-swatch-hex').value.trim();
  var edits = {
    i_have: i_have,
    wishlist: wishlist,
    purchased_date: purchased_date,
    my_notes: document.getElementById('edit-notes').value.trim(),
    supplier: document.getElementById('edit-supplier').value.trim(),
    supplier_info: document.getElementById('edit-supplier-info').value.trim(),
    updated: new Date().toISOString().split('T')[0]
  };
  if (editPhotoDataUrl) edits.photo = editPhotoDataUrl;
  if (hexInput && /^#[0-9a-fA-F]{3,6}$/.test(hexInput)) edits.color_swatch = hexInput;

  var existing = {};
  try { existing = JSON.parse(localStorage.getItem('cosme-edits-ingredient-' + currentIngredient.id) || '{}'); } catch(e){}
  localStorage.setItem('cosme-edits-ingredient-' + currentIngredient.id, JSON.stringify(Object.assign({}, existing, edits)));
  currentIngredient = Object.assign({}, currentIngredient, edits);
  renderIngredient();
}

// ── UTILS ──────────────────────────────────────────────────────────────────

function showError(msg) {
  document.getElementById('ingredient-root').innerHTML = '<div class="empty-state">' + escHtml(msg) + '</div>';
}

function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
